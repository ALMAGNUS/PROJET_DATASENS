name: E3 Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e3-quality-gate:
    name: E3 targeted tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}:${{ github.workspace }}/src:$PYTHONPATH" >> $GITHUB_ENV

      - name: Run E3 quality gate
        run: python scripts/run_e3_quality_gate.py

