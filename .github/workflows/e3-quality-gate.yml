name: E3 Quality Gate

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'reports/**'
      - 'docs/**'
      - 'presentations/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: e3-quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e3-quality-gate:
    name: E3 targeted tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1635a86e563ffaeffaadfec69fc2c948700f057362efa61f8 # v4.2.2
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}:${{ github.workspace }}/src:$PYTHONPATH" >> $GITHUB_ENV

      - name: Run E3 quality gate
        run: python scripts/run_e3_quality_gate.py

