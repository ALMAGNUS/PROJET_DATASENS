# Prometheus Alerting Rules - DataSens E1

groups:
  - name: datasens_alerts
    interval: 30s
    rules:
      # Pipeline Errors
      - alert: PipelineHighErrorRate
        expr: rate(datasens_pipeline_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High pipeline error rate detected"
          description: "Pipeline error rate is {{ $value }} errors/sec"

      # Source Extraction Failures
      - alert: SourceExtractionFailure
        expr: rate(datasens_source_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Source extraction failing"
          description: "Source {{ $labels.source }} has error rate {{ $value }} errors/sec"

      # Low Enrichment Rate
      - alert: LowEnrichmentRate
        expr: datasens_enrichment_rate < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low enrichment rate"
          description: "Enrichment rate is {{ $value | humanizePercentage }}"

      # No Articles Collected
      - alert: NoArticlesCollected
        expr: rate(datasens_articles_extracted_total[1h]) == 0
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "No articles collected in the last hour"
          description: "Pipeline has not collected any articles for 1 hour"

      # Database Growth
      - alert: DatabaseGrowthStalled
        expr: rate(datasens_articles_in_database[1h]) < 1
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "Database growth stalled"
          description: "Database is not growing at expected rate"

  # API E2 & Drift (MLOps)
  - name: datasens_api_drift_alerts
    interval: 30s
    rules:
      # Drift score élevé — envisager réentraînement
      - alert: DriftScoreHigh
        expr: datasens_drift_score > 0.7
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Drift score élevé — envisager réentraînement"
          description: "Drift score = {{ $value }} (seuil 0.7). Vérifier distribution sentiment/topics."

      # Taux d'erreur API élevé
      - alert: APIHighErrorRate
        expr: |
          sum(rate(datasens_e2_api_errors_total[5m])) 
          / sum(rate(datasens_e2_api_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreur API > 5%"
          description: "Taux erreurs = {{ $value | humanizePercentage }}"

      # Latence p95 excessive
      - alert: APIHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(datasens_e2_api_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence p95 API > 5s"
          description: "Latence p95 = {{ $value }}s"

      # Échecs authentification (brute-force possible)
      - alert: APIAuthFailuresHigh
        expr: sum(rate(datasens_e2_api_authentications_total{status="failed"}[5m])) * 60 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Échecs auth > 10/min"
          description: "Tentatives auth échouées = {{ $value }}/min"

